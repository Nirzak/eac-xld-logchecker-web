services:
  logchecker-test:
    image: ghcr.io/nirzak/audio-ripping-logchecker:test
    container_name: logchecker-test
    build: .
    environment:
      - PUID=1002
      - PGID=1002
      - SUBPATH=/logchecker-test
      - LOG_LEVEL=info
    ports:
      - "5051:5050"
    volumes:
      - ./logs:/app/logs
    restart: unless-stopped
